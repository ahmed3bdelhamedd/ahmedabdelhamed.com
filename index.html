<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Abdelhamed | Data Analyst</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00c2ff; --bg: #080d14; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px; border-radius: 30px; text-align: center; max-width: 500px; width: 90%; transition: 0.4s; }
        .profile-img { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,194,255,0.2); }
        h1 { margin: 10px 0; font-size: 2.2rem; }
        .role { color: var(--accent); font-weight: 500; margin-bottom: 30px; }
        
        /* الأزرار المودرن */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn { padding: 12px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 14px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); color: #fff; }
        .btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
        .btn-main { grid-column: span 2; background: var(--accent); color: #000; border: none; }
        .btn-main:hover { background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <img src="me.jpg" alt="Ahmed Abdelhamed" class="profile-img">
    <h1>Ahmed Abdelhamed</h1>
    <p class="role">Data Analyst & BI Enthusiast</p>
    <p style="color: #94a3b8; font-size: 0.9rem;">IT & Accounting professional passionate about data-driven solutions and organizational performance.</p>

    <div class="actions">
        <!-- زرار الاتصال -->
        <a href="tel:+201116512028" class="btn"><i class="fas fa-phone"></i> Call Me</a>
        <!-- زرار الإيميل -->
        <a href="mailto:ahmed3bdelhamedwork@gmail.com" class="btn"><i class="fas fa-envelope"></i> Email</a>
        <!-- زرار السي في -->
        <a href="cv.pdf" download class="btn btn-main"><i class="fas fa-download"></i> Download CV</a>
    </div>
</div>

</body>
</html>
